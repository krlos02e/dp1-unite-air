version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: unite-air-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: unite_air
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
